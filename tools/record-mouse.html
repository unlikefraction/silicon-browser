<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silicon Browser - Mouse Movement Recorder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; overflow: hidden; height: 100vh; }
  #canvas { width: 100vw; height: 100vh; display: block; cursor: crosshair; }
  #hud { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.85); border: 1px solid #333; border-radius: 12px; padding: 20px; min-width: 320px; z-index: 10; }
  #hud h2 { font-size: 16px; color: #7dd3fc; margin-bottom: 12px; }
  .stat { display: flex; justify-content: space-between; margin: 6px 0; font-size: 13px; }
  .stat .label { color: #888; }
  .stat .value { color: #fff; font-variant-numeric: tabular-nums; }
  #targets { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
  .target { position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #4ade80; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #4ade80; transition: all 0.15s; pointer-events: auto; cursor: pointer; }
  .target:hover { background: rgba(74, 222, 128, 0.15); transform: scale(1.1); }
  .target.clicked { border-color: #facc15; color: #facc15; animation: pulse 0.3s; }
  @keyframes pulse { 50% { transform: scale(1.3); } }
  #instructions { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid #333; border-radius: 12px; padding: 16px 24px; text-align: center; z-index: 10; }
  #instructions p { font-size: 14px; color: #aaa; margin: 4px 0; }
  #instructions strong { color: #7dd3fc; }
  #btn-export { position: fixed; top: 20px; right: 20px; background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; z-index: 10; }
  #btn-export:hover { background: #1d4ed8; }
  #btn-export:disabled { background: #333; color: #666; cursor: not-allowed; }
  #trail { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<svg id="trail" xmlns="http://www.w3.org/2000/svg"></svg>
<div id="targets"></div>

<div id="hud">
  <h2>Mouse Movement Recorder</h2>
  <div class="stat"><span class="label">Points recorded</span><span class="value" id="s-points">0</span></div>
  <div class="stat"><span class="label">Gestures (A to B)</span><span class="value" id="s-gestures">0</span></div>
  <div class="stat"><span class="label">Clicks</span><span class="value" id="s-clicks">0</span></div>
  <div class="stat"><span class="label">Scrolls</span><span class="value" id="s-scrolls">0</span></div>
  <div class="stat"><span class="label">Duration</span><span class="value" id="s-duration">0.0s</span></div>
  <div class="stat"><span class="label">Current target</span><span class="value" id="s-target">-</span></div>
</div>

<button id="btn-export" disabled>Export JSON (need 5+ gestures)</button>

<div id="instructions">
  <p>Click the <strong>numbered circles</strong> in order (1, 2, 3...)</p>
  <p>Move naturally between them. Circles will reposition after each click.</p>
  <p>Also <strong>scroll</strong> anywhere. We record everything.</p>
</div>

<script>
const data = {
  moves: [],       // {x, y, t, vx, vy}
  clicks: [],      // {x, y, t, button}
  scrolls: [],     // {dx, dy, t}
  gestures: [],    // [{points: [{x,y,t}...], from: {x,y}, to: {x,y}, duration}]
  screen: { w: window.innerWidth, h: window.innerHeight },
  recorded: new Date().toISOString(),
};

let currentGesture = [];
let gestureStart = null;
let targetIndex = 0;
let startTime = performance.now();
let lastX = 0, lastY = 0, lastT = 0;

const $ = id => document.getElementById(id);
const targetsEl = $('targets');
const trailSvg = $('trail');

// Generate random positions for targets
function placeTargets() {
  targetsEl.innerHTML = '';
  const margin = 100;
  const positions = [];
  for (let i = 0; i < 8; i++) {
    let x, y, ok;
    do {
      x = margin + Math.random() * (window.innerWidth - 2 * margin);
      y = margin + Math.random() * (window.innerHeight - 2 * margin);
      ok = positions.every(p => Math.hypot(p.x - x, p.y - y) > 120);
    } while (!ok && positions.length > 0);
    positions.push({ x, y });
    const div = document.createElement('div');
    div.className = 'target';
    div.style.left = (x - 30) + 'px';
    div.style.top = (y - 30) + 'px';
    div.textContent = i + 1;
    div.dataset.index = i;
    div.addEventListener('click', onTargetClick);
    if (i > 0) div.style.opacity = '0.3';
    targetsEl.appendChild(div);
  }
}

function onTargetClick(e) {
  const idx = parseInt(e.target.dataset.index);
  if (idx !== targetIndex) return;

  e.target.classList.add('clicked');

  // End current gesture
  if (currentGesture.length > 2) {
    const g = {
      points: currentGesture.map(p => ({ x: p.x, y: p.y, t: p.t })),
      from: { x: currentGesture[0].x, y: currentGesture[0].y },
      to: { x: e.clientX, y: e.clientY },
      duration: currentGesture[currentGesture.length - 1].t - currentGesture[0].t,
    };
    data.gestures.push(g);
    $('s-gestures').textContent = data.gestures.length;

    if (data.gestures.length >= 5) {
      $('btn-export').disabled = false;
    }
  }

  // Draw trail
  if (currentGesture.length > 2) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const pts = currentGesture;
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
    path.setAttribute('d', d);
    path.setAttribute('stroke', `hsl(${(data.gestures.length * 40) % 360}, 70%, 50%)`);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.4');
    trailSvg.appendChild(path);
  }

  currentGesture = [];
  targetIndex++;
  $('s-target').textContent = targetIndex < 8 ? (targetIndex + 1) : 'done!';

  // Highlight next target
  const targets = targetsEl.children;
  if (targetIndex < targets.length) {
    targets[targetIndex].style.opacity = '1';
  }

  // After all 8, reposition
  if (targetIndex >= 8) {
    setTimeout(() => {
      targetIndex = 0;
      trailSvg.innerHTML = '';
      placeTargets();
      $('s-target').textContent = '1';
    }, 800);
  }
}

// Record mouse moves (throttled to ~60fps)
let moveRAF = null;
document.addEventListener('mousemove', (e) => {
  if (moveRAF) return;
  moveRAF = requestAnimationFrame(() => {
    const t = performance.now() - startTime;
    const dt = t - lastT;
    const vx = dt > 0 ? (e.clientX - lastX) / dt : 0;
    const vy = dt > 0 ? (e.clientY - lastY) / dt : 0;

    data.moves.push({ x: e.clientX, y: e.clientY, t: Math.round(t), vx: +vx.toFixed(3), vy: +vy.toFixed(3) });
    currentGesture.push({ x: e.clientX, y: e.clientY, t: Math.round(t) });

    lastX = e.clientX; lastY = e.clientY; lastT = t;
    $('s-points').textContent = data.moves.length;
    $('s-duration').textContent = (t / 1000).toFixed(1) + 's';
    moveRAF = null;
  });
});

// Record clicks
document.addEventListener('mousedown', (e) => {
  const t = performance.now() - startTime;
  data.clicks.push({ x: e.clientX, y: e.clientY, t: Math.round(t), button: e.button });
  $('s-clicks').textContent = data.clicks.length;
});

// Record scrolls
document.addEventListener('wheel', (e) => {
  const t = performance.now() - startTime;
  data.scrolls.push({ dx: e.deltaX, dy: e.deltaY, t: Math.round(t) });
  $('s-scrolls').textContent = data.scrolls.length;
}, { passive: true });

// Export
$('btn-export').addEventListener('click', () => {
  // Compute gesture statistics for the model
  const stats = data.gestures.map(g => {
    const pts = g.points;
    let totalDist = 0, maxSpeed = 0, speeds = [];
    for (let i = 1; i < pts.length; i++) {
      const dx = pts[i].x - pts[i-1].x;
      const dy = pts[i].y - pts[i-1].y;
      const dt = pts[i].t - pts[i-1].t;
      const dist = Math.hypot(dx, dy);
      totalDist += dist;
      const speed = dt > 0 ? dist / dt : 0;
      speeds.push(speed);
      maxSpeed = Math.max(maxSpeed, speed);
    }
    const straightDist = Math.hypot(g.to.x - g.from.x, g.to.y - g.from.y);
    return {
      duration: g.duration,
      totalDist: +totalDist.toFixed(1),
      straightDist: +straightDist.toFixed(1),
      curvature: straightDist > 0 ? +(totalDist / straightDist).toFixed(3) : 1,
      maxSpeed: +maxSpeed.toFixed(3),
      avgSpeed: speeds.length > 0 ? +(speeds.reduce((a,b) => a+b, 0) / speeds.length).toFixed(3) : 0,
      pointCount: pts.length,
    };
  });

  const output = { ...data, gestureStats: stats };
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mouse-data-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

// Init
placeTargets();
$('s-target').textContent = '1';
</script>
</body>
</html>
